<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1d1f21; overflow: hidden; font-family: system-ui, sans-serif; color: #c5c8c6; }
  canvas { display: block; }
  #info {
    position: absolute; top: 14px; left: 14px;
    font-size: 13px;
    background: rgba(0,0,0,0.55); padding: 8px 14px;
    border-radius: 8px; pointer-events: none;
    border: 1px solid rgba(255,255,255,0.08);
    line-height: 1.7;
  }
  #model-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; color: #fff; }
  #controls-hint { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  #loader {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 16px; opacity: 0.7;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #toolbar {
    position: absolute; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  #toolbar button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #c5c8c6; padding: 7px 16px;
    border-radius: 6px; cursor: pointer;
    font-size: 13px; transition: background 0.15s;
  }
  #toolbar button:hover { background: rgba(255,255,255,0.18); }
  #toolbar button.active { background: rgba(100,180,255,0.2); border-color: rgba(100,180,255,0.4); color: #90c8ff; }
  #error {
    display: none;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(180,40,40,0.3); border: 1px solid rgba(255,80,80,0.4);
    padding: 20px 30px; border-radius: 10px; text-align: center; max-width: 400px;
  }
  #error h3 { color: #ff8080; margin-bottom: 8px; }
  #error p { font-size: 13px; opacity: 0.8; }
</style>
</head>
<body>
<div id="info">
  <div id="model-name">Loading...</div>
  <div>🖱️ Drag · Scroll · Right-drag pan</div>
  <div id="controls-hint"></div>
</div>
<div id="loader"><div class="spinner"></div><div>Loading model...</div></div>
<div id="error"><h3>Model not found</h3><p id="error-detail"></p></div>
<div id="toolbar">
  <button onclick="resetCamera()">⟳ Reset</button>
  <button id="btn-wire" onclick="toggleWireframe()">⬡ Wireframe</button>
  <button id="btn-rotate" onclick="toggleAutoRotate()">↻ Auto-Rotate</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

let scene, camera, renderer, controls;
let meshes = [];
let wireframeMode = false;
let initialCamPos, initialTarget;

const params = new URLSearchParams(window.location.search);
const modelParam = params.get('model') || '';
const modelDisplayName = modelParam
  ? modelParam.replace(/^.*\//, '').replace(/\.stl$/i, '').replace(/[-_]/g, ' ')
  : '';
document.getElementById('model-name').textContent = modelDisplayName || 'No model';

init();
loadScene(modelParam);
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1d1f21);

  camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 50000);
  camera.position.set(200, 180, 200);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const key = new THREE.DirectionalLight(0xffffff, 1.0);
  key.position.set(200, 400, 200); key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xb0c8ff, 0.35);
  fill.position.set(-200, 100, -100); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xfff0e0, 0.2);
  rim.position.set(0, -100, -200); scene.add(rim);

  scene.add(new THREE.GridHelper(1000, 50, 0x383838, 0x2a2a2a));

  const shadowPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(2000, 2000),
    new THREE.ShadowMaterial({ opacity: 0.2 })
  );
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.receiveShadow = true;
  scene.add(shadowPlane);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.autoRotate = false;
  controls.autoRotateSpeed = 1.5;

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

async function loadScene(modelParam) {
  if (!modelParam) {
    showError('No model specified. Add ?model=name to the URL.');
    return;
  }

  // Check for multi-part manifest
  const baseName = modelParam.replace(/\.stl$/i, '');
  const manifestUrl = `models/${baseName}.manifest.json`;

  try {
    const res = await fetch(manifestUrl);
    if (res.ok) {
      const manifest = await res.json();
      await loadMultiPart(baseName, manifest);
    } else {
      // Single STL fallback
      const url = modelParam.startsWith('http') ? modelParam
        : modelParam.endsWith('.stl') ? `models/${modelParam}` : `models/${modelParam}.stl`;
      await loadSingleSTL(url, { color: '#c4915a', metalness: 0.05, roughness: 0.65 });
    }
  } catch(e) {
    showError(`Failed to load model: ${e.message}`);
  }

  document.getElementById('loader').style.display = 'none';
  fitCamera();
}

function loadSingleSTL(url, matProps) {
  return new Promise((resolve, reject) => {
    new STLLoader().load(url, (geo) => {
      geo.computeVertexNormals();
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(matProps.color || '#c4915a'),
        metalness: matProps.metalness ?? 0.05,
        roughness: matProps.roughness ?? 0.65,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      meshes.push(mesh);
      resolve();
    }, undefined, reject);
  });
}

async function loadMultiPart(baseName, manifest) {
  const loaderEl = document.querySelector('#loader div:last-child');
  const total = manifest.parts.length;
  for (let i = 0; i < total; i++) {
    const part = manifest.parts[i];
    loaderEl.textContent = `Loading parts... ${i + 1}/${total}`;
    const url = `models/${baseName}-parts/${part.module}.stl`;
    await loadSingleSTL(url, part);
  }
}

function fitCamera() {
  if (meshes.length === 0) return;
  const box = new THREE.Box3();
  meshes.forEach(m => box.expandByObject(m));
  const size = new THREE.Vector3();
  box.getSize(size);
  const center = new THREE.Vector3();
  box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z);

  // Sit on ground: shift so bottom = y=0
  const yOffset = -box.min.y;
  meshes.forEach(m => m.position.y += yOffset);

  const dist = maxDim * 2.2;
  camera.position.set(dist * 0.8, dist * 0.7, dist * 0.8);
  controls.target.set(center.x, center.y + yOffset, center.z);
  controls.update();

  initialCamPos = camera.position.clone();
  initialTarget = controls.target.clone();

  const totalVerts = meshes.reduce((s, m) => s + m.geometry.attributes.position.count, 0);
  document.getElementById('controls-hint').textContent = `${totalVerts.toLocaleString()} verts · ${meshes.length} part${meshes.length > 1 ? 's' : ''}`;
}

function showError(msg) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error-detail').textContent = msg;
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

window.resetCamera = () => {
  if (!initialCamPos) return;
  camera.position.copy(initialCamPos);
  controls.target.copy(initialTarget);
  controls.update();
};
window.toggleWireframe = () => {
  wireframeMode = !wireframeMode;
  meshes.forEach(m => m.material.wireframe = wireframeMode);
  document.getElementById('btn-wire').classList.toggle('active', wireframeMode);
};
window.toggleAutoRotate = () => {
  controls.autoRotate = !controls.autoRotate;
  document.getElementById('btn-rotate').classList.toggle('active', controls.autoRotate);
};
</script>
</body>
</html>
